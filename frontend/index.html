<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zonificador Clientes PRO</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="sidebar">
    <h2>Zonificador PRO</h2>
    <p>Gestión automática de clientes y polígonos</p>
</div>

<div class="main">

    <div class="header">
        <h1>Dashboard Operativo</h1>
    </div>

    <div class="cards">
        <div class="card">
            <h3>Clientes</h3>
            <p id="clientes">0</p>
        </div>

        <div class="card">
            <h3>Polígonos</h3>
            <p id="poligonos">0</p>
        </div>

        <div class="card">
            <h3>Última actualización</h3>
            <p id="fecha">--</p>
        </div>
    </div>

    <div class="actions">
        <button onclick="actualizarDatos()">Actualizar Datos</button>
        <button onclick="descargarExcel()">Descargar Excel</button>
    </div>

    <div class="table-container">
        <table id="tabla">
            <thead>
                <tr>
                    <th>Cliente</th>
                    <th>Código</th>
                    <th>Polígono</th>
                </tr>
            </thead>
            <tbody>
            </tbody>
        </table>
    </div>

    <div id="estado"></div>

</div>

<script src="app.js"></script>
</body>
</html>
