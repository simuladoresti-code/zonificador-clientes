<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Zonificador</title>

<style>
body{
    font-family: Arial;
    background:#0f172a;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    background:#1e293b;
    padding:30px;
    border-radius:12px;
    width:300px;
    text-align:center;
}

button{
    width:100%;
    padding:12px;
    border:none;
    background:#2563eb;
    color:white;
    cursor:pointer;
    border-radius:8px;
    font-size:16px;
}

button:hover{
    background:#1d4ed8;
}

#estado{
    margin-top:15px;
    font-size:14px;
    color:#cbd5e1;
}
</style>

</head>

<body>

<div class="card">

    <h2>📍 Zonificador</h2>

    <button onclick="generar()">🚀 Generar Excel</button>

    <p id="estado">Listo</p>

</div>

<script>
const API = "https://zonificador-clientes.onrender.com";

async function generar() {

    const estado = document.getElementById("estado");
    estado.innerText = "Procesando...";

    try {

        const res = await fetch(`${API}/actualizar`, {
            method: "POST"
        });

        if (!res.ok) {
            const err = await res.json();
            estado.innerText = err.error || "Error";
            return;
        }

        const blob = await res.blob();

        const url = window.URL.createObjectURL(blob);

        const a = document.createElement("a");
        a.href = url;
        a.download = "zonificacion.xlsx";
        document.body.appendChild(a);
        a.click();

        a.remove();

        estado.innerText = "Descargado ✔";

    } catch (e) {
        estado.innerText = "Error de conexión ❌";
    }
}
</script>

</body>
</html>
