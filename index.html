<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Zonificador</title>

<style>
body{
    font-family: Arial;
    background:#0f172a;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    background:#1e293b;
    padding:30px;
    border-radius:12px;
    width:320px;
    text-align:center;
}

button{
    width:100%;
    padding:12px;
    border:none;
    background:#2563eb;
    color:white;
    cursor:pointer;
    border-radius:8px;
    font-size:16px;
}

button:hover{
    background:#1d4ed8;
}

#estado{
    margin-top:15px;
    font-size:14px;
    color:#cbd5e1;
}

.loader{
    display:none;
    margin-top:10px;
}
</style>

</head>

<body>

<div class="card">

    <h2>📍 Zonificador</h2>

    <button onclick="generar()">🚀 Generar Excel</button>

    <div class="loader" id="loader">⏳ Procesando...</div>

    <p id="estado">Listo</p>

</div>

<script>

const API = "https://zonificador-clientes.onrender.com";

async function generar() {

    const estado = document.getElementById("estado");
    const loader = document.getElementById("loader");

    estado.innerText = "";
    loader.style.display = "block";

    try {

        const res = await fetch(`${API}/actualizar`, {
            method: "POST"
        });

        if (!res.ok) {

            let errText = "Error";

            try {
                const err = await res.json();
                errText = err.error;
            } catch (e) {}

            estado.innerText = "❌ " + errText;
            loader.style.display = "none";
            return;
        }

        const blob = await res.blob();

        const url = window.URL.createObjectURL(blob);

        const a = document.createElement("a");
        a.href = url;
        a.download = "zonificacion.xlsx";
        a.click();

        estado.innerText = "✔ Descargado";
        loader.style.display = "none";

    } catch (e) {

        estado.innerText = "❌ Error de conexión";
        loader.style.display = "none";
    }
}

</script>

</body>
</html>
</body>
</html>
