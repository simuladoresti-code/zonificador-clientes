<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zonificador PRO</title>

<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="sidebar">
    <h2>📍 Zonificador</h2>

    <button onclick="actualizar()">🔄 Actualizar</button>
    <button onclick="descargar()">📥 Descargar Excel</button>

    <input id="mapa" placeholder="Link Google My Maps">
    <button onclick="guardar()">Guardar Mapa</button>

    <p id="estado">Esperando...</p>
</div>

<div class="main">

    <h1>Dashboard</h1>

    <div class="cards">
        <div>Clientes: <span id="c"></span></div>
        <div>Con Polígono: <span id="cp"></span></div>
        <div>Sin Polígono: <span id="sp"></span></div>
    </div>

</div>

<script src="app.js"></script>

</body>
</html>
