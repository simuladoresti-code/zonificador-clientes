<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Zonificador KML</title>

<style>
body{
    font-family: Arial;
    background:#0f172a;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    background:#1e293b;
    padding:25px;
    border-radius:12px;
    width:320px;
    text-align:center;
}

input{
    width:100%;
    margin:10px 0;
    padding:10px;
    background:white;
    color:black;
    border-radius:6px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    background:#2563eb;
    color:white;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

#estado{
    margin-top:10px;
    font-size:14px;
}
</style>

</head>

<body>

<div class="card">

    <h2>📍 Zonificador</h2>

    <p>Clientes KML</p>
    <input type="file" id="clientes">

    <p>Polígonos KML</p>
    <input type="file" id="poligonos">

    <button onclick="generar()">🚀 Generar Excel</button>

    <p id="estado">Listo</p>

</div>

<script>
const API = "https://zonificador-clientes.onrender.com";

async function generar() {

    const clientes = document.getElementById("clientes").files[0];
    const poligonos = document.getElementById("poligonos").files[0];

    if (!clientes || !poligonos) {
        document.getElementById("estado").innerText = "Sube ambos archivos";
        return;
    }

    document.getElementById("estado").innerText = "Procesando...";

    const formData = new FormData();
    formData.append("clientes", clientes);
    formData.append("poligonos", poligonos);

    try {

        const res = await fetch(`${API}/actualizar`, {
            method: "POST",
            body: formData
        });

        if (!res.ok) {
            const err = await res.json();
            document.getElementById("estado").innerText = err.error;
            return;
        }

        const blob = await res.blob();

        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "zonificacion.xlsx";
        a.click();

        document.getElementById("estado").innerText = "Descargado ✔";

    } catch (e) {
        document.getElementById("estado").innerText = "Error conexión";
    }
}
</script>

</body>
</html>
